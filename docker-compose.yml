version: '3.8'

services:

  backend:
    build: ./backend

    ports:
      - "8000:8000"

    volumes:
      - smat_sqlite_data:/app/data

    environment:
      - DATABASE_URL=sqlite:////app/data/smat.db

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 5s
      timeout: 3s
      retries: 3

  mqtt_bridge:
    build: ./iot_device

    depends_on:
      backend:
        condition: service_healthy

    environment:
      - API_URL=http://backend:8000/lecturas/
      - JWT_TOKEN=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJhZG1pbiIsImV4cCI6MTc4MjkyMjk5OH0.BlLSJTUsy-MkQM-WVfDr5s7nwpCJTU__F7pS0BjXK3s

volumes:
  smat_sqlite_data: